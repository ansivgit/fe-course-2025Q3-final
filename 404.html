<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Redirecting</title>
  <script>
    const repoBase = '/fe-course-2025Q3-final/';
    const path = window.location.pathname.replace(repoBase, '');
    window.location.replace(repoBase + 'index.html#/' + path + window.location.search + window.location.hash);
  </script>
</head>
<body></body>
</html>
